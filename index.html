<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>6.3 국민의힘 여론조사 판세 보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#0f172a;min-height:100vh;}
.hdr{background:#0f172a;padding:14px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.hdr-top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
.hdr-title{font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:-.4px;}
.hdr-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#64748b;}
.nav{display:flex;align-items:center;border-top:1px solid #1e293b;}
.nav-scroll{display:flex;align-items:center;overflow-x:auto;white-space:nowrap;flex:1;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.ntab{padding:8px 13px;font-size:11.5px;font-weight:500;color:#64748b;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Noto Sans KR',sans-serif;}
.ntab:hover{color:#cbd5e1;}
.ntab.on{color:#f8fafc;border-bottom-color:#dc2626;}
.ntab.home{color:#f8fafc;font-weight:900;font-size:13px;letter-spacing:-.3px;}
.ntab.home.on{color:#fbbf24;border-bottom-color:#fbbf24;}
.ntab.rebo{color:#c4b5fd;}
.ntab.rebo:hover{color:#e9d5ff;}
.ntab.rebo.on{color:#f8fafc;border-bottom-color:#a78bfa;}
.ntab.rebo{color:#a78bfa;}
.ntab.rebo:hover{color:#c4b5fd;}
.ntab.rebo.on{color:#f8fafc;border-bottom-color:#a78bfa;}
.sep{color:#334155;font-size:11px;padding:0 4px;}
.rlabel{color:#64748b;font-size:10.5px;padding:6px 4px;}
/* 섹션 */
.sec{display:none;padding:16px 0 28px;}
.sec.on{display:block;}
/* 요약 카드 */
.sum-wrap{max-width:920px;margin:0 auto;padding:16px;}
.sum-sec-title{font-size:15px;font-weight:900;margin-bottom:10px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;color:#0f172a;letter-spacing:-.3px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
.sum-sub{font-weight:400;color:#475569;font-size:11.5px;}
.cards-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pcard{border-radius:8px;padding:10px 12px;flex:1;min-width:90px;}
.pcard.link{cursor:pointer;transition:opacity .15s;}
.pcard.link:hover{opacity:.8;}
.pc-name{font-size:13px;font-weight:700;}
.pc-ps{font-size:10px;font-weight:600;margin-top:2px;opacity:.85;}
.pc-tr{font-size:10px;opacity:.85;margin-top:2px;}
.pc-nt{font-size:10px;margin-top:5px;display:inline-block;background:rgba(255,255,255,0.85);padding:1px 7px;border-radius:4px;color:#374151;letter-spacing:-.2px;}
.sum-legend{font-size:10px;color:#94a3b8;line-height:1.7;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;}
.lb{padding:1px 6px;border-radius:3px;font-size:9.5px;}
/* 차트 카드 */
.chart-wrap{max-width:760px;margin:0 auto;padding:0 16px;}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px 22px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.card-top{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.c-region{font-size:24px;font-weight:900;letter-spacing:-1.2px;}
.ps-badge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid;}
.c-trend{font-size:12px;font-weight:500;}
.c-trend2{font-size:10.5px;color:#64748b;margin-top:3px;}
.cands{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.cand{display:flex;align-items:center;gap:5px;font-size:12px;}
.cl{width:18px;height:3px;border-radius:2px;display:inline-block;}
.cn{font-weight:700;} .cp{color:#94a3b8;font-size:10px;}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.st{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:6px 14px;text-align:center;}
.stv{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.stl{font-size:9.5px;color:#94a3b8;margin-top:2px;}
/* 시나리오 탭 (울산) */
.stabs{display:flex;gap:4px;margin-bottom:12px;}
.stab{padding:4px 10px;font-size:11px;font-weight:600;border-radius:5px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.stab.on{background:#0f172a;border-color:#0f172a;color:#fff;}
.cwrap{position:relative;height:270px;}
.chart-note{margin-top:8px;font-size:10px;color:#94a3b8;display:flex;gap:12px;flex-wrap:wrap;}
.warn-badge{color:#854d0e;background:#fef9c3;padding:2px 7px;border-radius:4px;font-weight:600;}
.pnote{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:10.5px;line-height:1.6;}
/* 토글 */
.toggle-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;margin:14px 0 8px;}
.toggle-row span{font-size:12px;font-weight:600;color:#475569;}
.knob{width:32px;height:18px;background:#e2e8f0;border-radius:9px;position:relative;transition:background .2s;flex-shrink:0;}
.knob.on{background:#0f172a;}
.knob::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;}
.knob.on::after{left:16px;}
/* 테이블 */
.tbl-wrap{overflow-x:auto;display:none;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead tr{background:#f8fafc;}
th{padding:7px 10px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #e2e8f0;font-size:11px;white-space:nowrap;}
td{padding:6px 10px;border-bottom:1px solid #f1f5f9;}
td.lc{font-weight:500;color:#0f172a;}
td.mono{font-family:'IBM Plex Mono',monospace;font-weight:700;}
tr:not([class]) td{background:#fff;}
tr:hover td{filter:brightness(.97);}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;}
.tag-tel{background:#eff6ff;color:#1e40af;}
.tag-ars{background:#f8fafc;color:#64748b;}
.tag-w{background:#fef9c3;color:#854d0e;font-weight:600;}
.g-light td{background:#dbeafe!important;}
.g-mid td{background:#93c5fd!important;}
.g-dark td{background:#1d4ed8!important;}
.g-dark td.lc{color:#fff!important;}
.g-dark td.mono{color:#fff!important;}
.g-rev td{background:#fee2e2!important;}
.g-rev-light td{background:#fee2e2!important;}
.g-rev-mid td{background:#fca5a5!important;}
.g-rev-dark td{background:#b91c1c!important;color:#fff!important;}
.g-rev-dark td.mono{color:#fff!important;}
.g-jk-light td{background:#dde6f5!important;}
.g-jk-mid td{background:#aab8dc!important;}
.g-jk-dark td{background:#1e3a8a!important;color:#fff!important;}
.g-jk-dark td.mono{color:#fff!important;}
.g-hd-light td{background:#f1f5f9!important;}
.g-hd-mid td{background:#e2e8f0!important;}
.g-hd-dark td{background:#cbd5e1!important;}
.tbl-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.tl{display:flex;align-items:center;gap:4px;font-size:10.5px;color:#475569;}
.tl-box{width:13px;height:13px;border-radius:3px;border:1px solid rgba(0,0,0,.08);}
.excl-note{margin-top:8px;font-size:10.5px;color:#94a3b8;padding:5px 10px;border-left:2px solid #e2e8f0;}
/* 기타 지역 표 */
.other-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px 22px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.other-sub{font-size:11px;color:#64748b;margin-top:3px;margin-bottom:16px;}
.other-sec{font-size:12px;font-weight:700;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid #e2e8f0;}
.o-열세 td{background:#1d4ed8;color:#fff;}
.o-경합-열세 td{background:#93c5fd;color:#1e3a8a;}
.o-경합 td{background:#dbeafe;color:#1e40af;}
.o-경합-light td{background:#dbeafe;color:#1e40af;}
.o-경합-우세 td{background:#fca5a5;color:#7f1d1d;}
.o-경합-red td{background:#fef2f2;color:#991b1b;}
.o-우세 td{background:#b91c1c;color:#fff;}
.o-무소속 td{background:#e2e8f0;color:#334155;}
</style>

<script>
// ============================================================
// 공통 유틸
// ============================================================
const PS_STYLE = {
  '열세':     {bg:'#fef2f2',bd:'#fca5a5',tx:'#991b1b'},
  '경합-열세':{bg:'#fff7ed',bd:'#fed7aa',tx:'#9a3412'},
  '경합':     {bg:'#fefce8',bd:'#fde047',tx:'#854d0e'},
  '경합-우세':{bg:'#f0fdf4',bd:'#86efac',tx:'#166534'},
  '우세':     {bg:'#eff6ff',bd:'#bfdbfe',tx:'#1e40af'},
};
const PC = {민주:'#1d4ed8', 국민:'#dc2626', 기타:'#6b7280', 조혁:'#7c3aed', 남색:'#1e3a8a'};
const EXCL_AGENCIES = ['여론조사꽃','공정','리서치웰','비전'];

function isExcl(agency){ return EXCL_AGENCIES.some(a=>agency.includes(a)); }

function gClass(g, excl, rev, useRevColor){
  if(excl) return '';
  if(g===0) return '';
  if(useRevColor && (rev||g<0)){
    const ag = Math.abs(g);
    if(ag<5) return 'g-rev-light';
    if(ag<10) return 'g-rev-mid';
    return 'g-rev-dark';
  }
  if(g<5) return 'g-light';
  if(g<10) return 'g-mid';
  return 'g-dark';
}

let charts = {};

// ============================================================
// 전체현황 카드
// ============================================================
const PS_CARD = {
  '열세':     'background:#1d4ed8;color:#fff;',
  '경합-열세':'background:#93c5fd;color:#1e3a8a;',
  '경합':     'background:#fefce8;color:#854d0e;',
  '경합-우세':'background:#fca5a5;color:#7f1d1d;',
  '우세':     'background:#b91c1c;color:#fff;',
};

function makeCard(name,panse,trend,note,sid){
  const d=document.createElement('div');
  d.className='pcard'+(sid?' link':'');
  d.style.cssText=(PS_CARD[panse]||'background:#e2e8f0;')+'border-radius:8px;padding:10px 12px;flex:1;min-width:90px;';
  if(sid) d.onclick=()=>showSec(sid, document.querySelector(`.ntab[onclick="showSec('${sid}',this)"]`));

  // 기호 추출
  const isUp = trend.includes('▲');
  const isDn = trend.includes('▼');
  const symColor = isUp?'#e53e3e':isDn?'#3182ce':'#94a3b8';
  const sym = isUp?'▲':isDn?'▼':'━';

  // 후보명 + 기호: 클릭 가능한 카드만
  let comboHtml = '';
  if(sid && (note!=='—' || sym)){
    const symSpan = sym ? `<span style="color:${symColor};font-weight:900;margin-right:3px;">${sym}</span>` : '';
    const nameText = note!=='—' ? note.replace(/[▲▼↑↓\-]\s*$/,'').trim() : '';
    comboHtml = `<div style="margin-top:6px;display:inline-block;background:#fff;color:#2d3748;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;">${symSpan}${nameText}</div>`;
  }

  const iconHtml = sid ? '<div style="text-align:right;font-size:11px;opacity:.45;margin-top:2px;">🔍</div>' : '';
  d.innerHTML = `<div class="pc-name">${name}</div><div class="pc-ps">${panse}</div>${comboHtml}${iconHtml}`;
  return d;
}

[
  ['서울','경합-열세','▲ 상승','오세훈 ▲','seoul'],
  ['부산','경합-열세','▲ 상승','박형준 ▲','busan'],
  ['대구','경합-우세','▲ 상승','추경호 ▲','daegu'],
  ['경남','경합-우세','▲ 상승','박완수 ▲','gyeongnam'],
  ['충남','경합-열세','— 유지','김태흠 -','chungnam'],
  ['울산','경합-열세','유지','김두겸 -','ulsan'],
  ['경기','열세','유지','양향자 -','gyeonggi'],
  ['강원','열세','유지','김진태 -','gangwon'],
  ['대전','열세','▼ 하락','이장우 ↓','daejeon'],
  ['충북','열세','유지','김영환 -','chungbuk'],
  ['경북','우세','-','—',null],
  ['인천','열세','-','—',null],
  ['세종','열세','-','—',null],
  ['광주·전남','열세','-','—',null],['전북','열세','-','—',null],['제주','열세','-','—',null],
].forEach(r=>document.getElementById('cr-gwang').appendChild(makeCard(...r)));

function renderChart(prefix, rows, opts){
  const canvas = document.getElementById('chart-'+prefix);
  if(!canvas) return;
  if(charts[prefix]){ charts[prefix].destroy(); }

  const labels = rows.map((r,i)=>{
    const cnt=rows.slice(0,i).filter(x=>x.period===r.period).length;
    return r.period+(cnt>0?'②':'');
  });

  const mainDs = opts.candidates.map((cand,ci)=>({
    type:'line', label:cand.name,
    data: rows.map(r=>r.vals[ci]),
    borderColor: cand.color,
    segment:{borderColor:ctx=>rows[ctx.p1DataIndex]&&isExcl(rows[ctx.p1DataIndex].agency)?cand.color+'55':cand.color},
    pointBackgroundColor: rows.map(r=>isExcl(r.agency)?'#fff':r.rev?'#f97316':cand.color),
    pointBorderColor: cand.color,
    pointBorderWidth: rows.map(r=>isExcl(r.agency)?2:0),
    pointRadius: rows.map(r=>isExcl(r.agency)?5:r.rev?7:r.method==='ARS'?3:5),
    pointStyle: rows.map(r=>isExcl(r.agency)?'rectRot':r.method==='ARS'?'triangle':'circle'),
    borderDash: cand.dash?[5,4]:[],
    tension:0.35, fill:false, yAxisID:'y'
  }));

  const gapDs = {
    type:'bar', label:'격차',
    data: rows.map(r=>opts.gapFn(r).toFixed(1)),
    backgroundColor: rows.map(r=>isExcl(r.agency)?'rgba(100,116,139,0.04)':'rgba(100,116,139,0.12)'),
    borderColor:'rgba(100,116,139,0.3)', borderWidth:1, yAxisID:'y2'
  };

  charts[prefix] = new Chart(canvas.getContext('2d'),{
    data:{labels, datasets:[...mainDs, gapDs]},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:items=>{const r=rows[items[0].dataIndex];return `${r.period} / ${r.agency} (${r.method})${isExcl(r.agency)?' ※단순참고':''}${r.rev?' 🔄역전':''}`;},
          label:item=>`${item.dataset.label}: ${item.parsed.y}%`
        }}},
      scales:{
        x:{ticks:{font:{size:10,family:"'IBM Plex Mono',monospace"},maxRotation:45},grid:{color:'rgba(0,0,0,0.04)'}},
        y:{min:opts.yMin||15,max:opts.yMax||58,position:'left',ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
        y2:{min:opts.y2Min||-10,max:opts.y2Max||25,position:'right',ticks:{callback:v=>v+'%p',font:{size:10},color:'#94a3b8'},grid:{drawOnChartArea:false}}
      }
    }
  });
}

function periodInRange(period, fromDay, toDay){
  const m = period.match(/5\.(\d+)~(\d+)/);
  if(!m) return false;
  return parseInt(m[2])>=fromDay && parseInt(m[1])<=toDay;
}
function renderStats(prefix, rows, gapFn){
  const cfg2 = REGION_CONFIGS[prefix];
  const sFn = (cfg2 && cfg2.statsFn) ? cfg2.statsFn : gapFn;
  const valid = rows.filter(r=>!isExcl(r.agency));
  const gaps = valid.map(r=>+sFn(r).toFixed(1));
  const avgValid = (cfg2 && cfg2.statsAvgFilter) ? valid.filter(cfg2.statsAvgFilter) : valid.slice(-3);
  const avg = avgValid.length?(avgValid.map(r=>sFn(r)).reduce((a,b)=>a+b,0)/avgValid.length).toFixed(1):'—';
  const avgLabel = (cfg2 && cfg2.statsAvgLabel) || '최근 3개 평균 격차';
  const mn = gaps.length?Math.min(...gaps).toFixed(1):'—';
  const revN = valid.filter(r=>r.rev).length;
  const revE = rows.filter(r=>r.rev&&isExcl(r.agency)).length;
  const revTxt = revE>0?`${revN}+${revE}회*`:`${revN}회`;
  const sNote = (cfg2&&cfg2.statsNote)?`<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;padding-left:2px;">${cfg2.statsNote}</div>`:'';
  document.getElementById('stats-'+prefix).innerHTML= sNote + `
    <div class="st"><div class="stv">${avg}%p</div><div class="stl">${avgLabel}</div></div>
    <div class="st"><div class="stv">${mn}%p</div><div class="stl">최소 격차</div></div>
    <div class="st"><div class="stv">${revTxt}</div><div class="stl">${(cfg2&&cfg2.revLabel)||'역전 조사'}</div></div>
    <div class="st"><div class="stv">${valid.length}건${rows.length-valid.length>0?` (+${rows.length-valid.length})`:''}</div><div class="stl">참고 조사 수</div></div>`;
}

function renderTable(prefix, rows, colDefs, gapFn, cfg){
  const ths = colDefs.map(c=>`<th${c.color?` style="color:${c.color}"`:''}>${c.label}</th>`).join('')
    + (cfg && cfg.extraGapFn ? `<th>${cfg.extraGapLabel||'추가 격차'}</th>` : '');
  const container = document.getElementById('tbl-inner-'+prefix);
  const tbody = document.createElement('tbody');
  rows.forEach(r=>{
    const g = +gapFn(r).toFixed(1);
    const excl = isExcl(r.agency);
    const extraGap = cfg && cfg.extraGapFn ? +cfg.extraGapFn(r).toFixed(1) : null;
    const egAbs = extraGap===null ? 0 : Math.abs(extraGap);
    const cls = (cfg && cfg.jkRevColor && r.rev && !excl)
      ? (g<5 ? 'g-jk-light' : g<10 ? 'g-jk-mid' : 'g-jk-dark')
      : (cfg && cfg.hdRevColor && extraGap!==null && extraGap<0 && !excl)
      ? (egAbs<5 ? 'g-hd-light' : egAbs<10 ? 'g-hd-mid' : 'g-hd-dark')
      : gClass(g, excl, r.rev, cfg ? cfg.tableRevColor !== false : true);
    const tr = document.createElement('tr');
    tr.className = cls;
    const isArs = r.method==='ARS';
    const egBg = extraGap===null ? '' : (isExcl(r.agency) ? 'background:#fff!important' : extraGap<0 ? (egAbs<5 ? 'background:#f1f5f9!important;color:#64748b' : egAbs<10 ? 'background:#e2e8f0!important;color:#475569' : 'background:#cbd5e1!important;color:#334155') : egAbs<5 ? 'background:#dbeafe!important;color:#1e40af!important' : egAbs<10 ? 'background:#93c5fd!important;color:#1e3a8a!important' : 'background:#60a5fa!important;color:#0f172a!important');
    const cells = [
      `<td class="lc">${r.period}</td>`,
      `<td class="lc">${r.agency}${excl?' <span class="tag-w">참고</span>':''}</td>`,
      `<td><span class="tag ${isArs?'tag-ars':'tag-tel'}">${r.method}</span></td>`,
      ...colDefs.slice(3,-1).map((col,i)=>`<td class="mono" style="color:${col.color||'#374151'}">${r.vals[i]}%</td>`),
      `<td class="mono" style="color:#64748b">${g}%p</td>`,
      ...(extraGap!==null ? [`<td style="${egBg};font-family:'IBM Plex Mono',monospace;font-weight:700;padding:6px 10px;">${extraGap}%p</td>`] : []),
    ];
    tr.innerHTML = cells.join('');
    tbody.appendChild(tr);
  });
  container.innerHTML = `<table><thead><tr>${ths}</tr></thead></table>`;
  container.querySelector('table').appendChild(tbody);
}

function toggleTbl(prefix){
  const w=document.getElementById('tbl-'+prefix);
  const k=document.getElementById('knob-'+prefix);
  const show=w.style.display!=='block';
  w.style.display=show?'block':'none';
  k.classList.toggle('on',show);
}

const initialized = new Set();

function showSec(id, btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  window.scrollTo(0,0);
  if(!initialized.has(id)){
    initialized.add(id);
    initSection(id);
  }
}

// ============================================================
// 각 지역 데이터 & 초기화
// ============================================================
function switchScenario(prefix, idx, btn){
  const card = document.getElementById('card-'+prefix);
  card.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  REGION_CONFIGS[prefix].currentScenario = idx;
  const cfg = REGION_CONFIGS[prefix];
  const sc = cfg.scenarios[idx];
  renderChart(prefix, sc.rows, {...cfg, candidates:sc.candidates||cfg.candidates, gapFn:sc.gapFn||cfg.gapFn});
  renderStats(prefix, sc.rows, sc.gapFn||cfg.gapFn);
  renderTable(prefix, sc.rows, sc.colDefs||cfg.colDefs, sc.gapFn||cfg.gapFn, cfg);
}

const REGION_CONFIGS = {};

function defRegion(prefix, cfg){
  REGION_CONFIGS[prefix] = cfg;
}

function initSection(id){
  const cfg = REGION_CONFIGS[id];
  if(!cfg || id==='others2'){ initOther(id); return; }
  buildRegionCard(id, cfg);
  const rows = cfg.scenarios ? cfg.scenarios[0].rows : cfg.rows;
  const gapFn = cfg.scenarios ? cfg.scenarios[0].gapFn : cfg.gapFn;
  const cands = cfg.scenarios ? cfg.scenarios[0].candidates||cfg.candidates : cfg.candidates;
  renderChart(id, rows, {...cfg, candidates:cands, gapFn});
  renderStats(id, rows, gapFn);
  if(id==='bnorth' && cfg.extraGapFn){
    const vRows = rows.filter(r=>!isExcl(r.agency));
    const hdGaps = vRows.map(r=>+(cfg.extraGapFn(r)).toFixed(1));
    const hdR3 = hdGaps.slice(-3);
    const hdAvg = (hdR3.reduce((a,b)=>a+b,0)/hdR3.length).toFixed(1);
    const hdMin = Math.min(...hdGaps).toFixed(1);
    const pn = document.querySelector('#card-bnorth .pnote');
    if(pn) pn.innerHTML = pn.innerHTML.replace('__HD_AVG__', hdAvg).replace('__HD_MIN__', hdMin);
  }
  const colDefs = cfg.scenarios ? cfg.scenarios[0].colDefs||cfg.colDefs : cfg.colDefs;
  renderTable(id, rows, colDefs, gapFn, cfg);
}
